version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: mcd-postgres
    environment:
      POSTGRES_USER: mcd_user
      POSTGRES_PASSWORD: mcd_password
      POSTGRES_DB: mcd_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mcd-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: mcd-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - mcd-network

  redis:
    image: redis:7-alpine
    container_name: mcd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mcd-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcd-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://mcd_user:mcd_password@postgres:5432/mcd_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
    depends_on:
      - postgres
      - elasticsearch
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - mcd-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mcd-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
      REACT_APP_WS_URL: ws://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mcd-network

volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:

networks:
  mcd-network:
    driver: bridge
